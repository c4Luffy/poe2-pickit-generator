name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest "ruff==0.15.20"
          pip install -e .

      - name: Byte-compile all modules (catches syntax errors)
        run: >
          python -m py_compile src/exilebot_pickit/__main__.py src/exilebot_pickit/generator.py
          src/exilebot_pickit/generators/assembly.py src/exilebot_pickit/ui/app.py
          src/exilebot_pickit/ui/common.py src/exilebot_pickit/ui/config.py src/exilebot_pickit/ui/updater.py
          src/exilebot_pickit/ui/tabs/chance_bases.py src/exilebot_pickit/ui/tabs/craft_bases.py
          src/exilebot_pickit/api/client.py src/exilebot_pickit/data/corrections.py
          src/exilebot_pickit/data/base_types.py
          tests/test_generator.py tests/test_assembly.py tests/test_updater.py

      - name: Lint (high-signal rules only — see pyproject.toml)
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -v

      - name: Validate [ItemLevel] placement in all generated rules
        run: |
          python - <<'EOF'
          import exilebot_pickit.generator as gen

          # Craft bases
          for line in gen.build_craft_base_rules():
              if "[StashItem]" in line and "#" in line:
                  before = line.split("#", 1)[0]
                  assert "[ItemLevel]" not in before, f"[ItemLevel] before # in craft base rule:\n  {line}"

          # Gear bases
          for line in gen.build_base_rules():
              if "[ItemLevel]" in line and "#" in line:
                  before = line.split("#", 1)[0]
                  assert "[ItemLevel]" not in before, f"[ItemLevel] before # in gear base rule:\n  {line}"

          print("All [ItemLevel] placements OK")
          EOF

  build:
    name: Build EXE (smoke test)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt "pyinstaller==6.21.0"
          pip install -e .

      # NOTE: keep these flags in sync with .github/workflows/release.yml so CI
      # actually exercises the build that ships. This job only verifies the build
      # succeeds — it never publishes a release (that's release.yml, on tags).
      - name: Build EXE (same flags as the release build)
        run: >
          pyinstaller --onefile --windowed --name ExileBot2PickitGenerator
          --icon src/exilebot_pickit/resources/appicon.ico
          --add-data "src/exilebot_pickit/webui/app.html;."
          --add-data "src/exilebot_pickit/resources/appicon.png;."
          --collect-all webview --collect-all clr_loader --collect-all pythonnet --collect-all pystray
          --collect-data certifi
          --hidden-import certifi --hidden-import charset_normalizer --hidden-import urllib3
          --hidden-import PIL --hidden-import PIL.Image --hidden-import PIL.ImageDraw
          --exclude-module unittest --exclude-module pydoc --exclude-module doctest
          --exclude-module lib2to3 --exclude-module test
          --exclude-module numpy --exclude-module pandas --exclude-module matplotlib --exclude-module scipy
          --collect-all exilebot_pickit
          --noconfirm src/exilebot_pickit/__main__.py

      - name: Verify the EXE was produced
        run: |
          if (-not (Test-Path dist/ExileBot2PickitGenerator.exe)) {
            Write-Error "Build did not produce ExileBot2PickitGenerator.exe"; exit 1
          }
          $size = (Get-Item dist/ExileBot2PickitGenerator.exe).Length
          Write-Host ("Built ExileBot2PickitGenerator.exe — {0:N0} bytes ({1:N1} MB)" -f $size, ($size/1MB))

      - name: Upload EXE artifact (for pre-release testing)
        uses: actions/upload-artifact@v4
        with:
          name: ExileBot2PickitGenerator-${{ github.sha }}
          path: dist/ExileBot2PickitGenerator.exe
          retention-days: 14
