name: Release Qt

# Build the PySide6 (Qt) app's Windows EXE and publish a GitHub Release whenever a
# Qt version tag (e.g. qt-v0.1.0) is pushed. Kept separate from the customtkinter
# app's `Release` workflow (which triggers on `v*`) and uses its own asset name
# (ExileBot2PickitQt.exe) so the two never collide. The in-app updater downloads
# releases/download/qt-v<version>/ExileBot2PickitQt.exe.

on:
  push:
    tags:
      - 'qt-v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r poe2-pickit-qt/requirements.txt pyinstaller

      - name: Build EXE
        working-directory: poe2-pickit-qt
        run: pyinstaller ExileBot2PickitQt.spec --noconfirm

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} poe2-pickit-qt/dist/ExileBot2PickitQt.exe --title ${{ github.ref_name }} --generate-notes
