# Daily watch for PoE2 patches that change the game data our rules depend on.
#
# Runs tools/check_game_data.py against the LIVE sources (NeverSink's filter + the GGPK
# mod dump). If a patch renamed/removed a stat id, broke a weight, or dropped a base our
# rules name, it opens (or comments on) a GitHub issue so a human knows to update
# game_data.json — the deliberate manual gate. It never edits data itself: auto-committing
# game data unreviewed is exactly where being wrong ships a broken pickit.
#
# Runs daily so a mid-week patch is caught within a day, not up to a week later.
# Low-noise regardless of cadence: nothing happens when the data is in sync, and one
# issue stays open (commented on) until resolved rather than a fresh one each run.
name: Game-data patch watch

on:
  schedule:
    - cron: "0 12 * * *"     # every day, 12:00 UTC
  workflow_dispatch:          # ...and on demand
    inputs:
      test_alert:
        description: "Open a TEST issue to verify the alert + email flow (safe; close it after)"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Check game data against the live patch
        # never let a network blip fail the job — the report step decides what to do
        run: python tools/check_game_data.py --json --force > result.json || true

      - name: Build the report
        id: report
        env:
          TEST_ALERT: ${{ inputs.test_alert }}
        run: |
          python - <<'PY'
          import json, os, sys
          try:
              r = json.load(open("result.json"))
          except Exception:
              r = {"critical": 0, "advisory": 0, "findings": [], "error": "checker produced no output"}
          # A broken checker must FAIL the run, not read as "everything in sync".
          # (An error result has critical=0/advisory=0, so it used to map to
          # has=no and the watch could die silently forever — dead sources,
          # broken import — while looking green every day.)
          if r.get("error"):
              print(f"::error::game-data checker itself failed: {r['error']}")
              sys.exit(1)
          crit, adv = int(r.get("critical", 0)), int(r.get("advisory", 0))
          has = crit > 0 or adv > 0
          # manual "test the pipe" run: force one issue so you can confirm it emails you
          if os.environ.get("TEST_ALERT") == "true" and not has:
              with open(os.environ["GITHUB_OUTPUT"], "a") as g:
                  g.write("has=yes\n")
              open("body.md", "w", encoding="utf-8").write(
                  "✅ **This is a test.** You triggered the game-data watch with *test alert* on, "
                  "so it filed this to prove the alert + email pipeline works. Your game data is "
                  "actually in sync — nothing is wrong. **Close this issue.** A real patch alert "
                  "lists exactly what changed and which rules it affects.")
              raise SystemExit(0)
          with open(os.environ["GITHUB_OUTPUT"], "a") as g:
              g.write(f"has={'yes' if has else 'no'}\n")
          if has:
              out = [f"The weekly game-data check found **{crit} critical** and **{adv} advisory** "
                     "finding(s) — a PoE2 patch has likely changed something our rules depend on.\n"]
              for f in r.get("findings", []):
                  mark = "❌" if f["level"] == "critical" else "⚠️"
                  out.append(f"- {mark} **[{f['kind']}] {f['title']}** — {f['detail']}  \n"
                             f"  _used by: {', '.join(f.get('where', []))}_")
              out.append("\n**Next step:** run `python tools/check_game_data.py` locally, update "
                         "`game_data.json` / the data modules, and re-verify (see the "
                         "`verify-game-data` guidance). This issue was filed automatically; it "
                         "will not spam — one stays open until the drift is resolved.")
              open("body.md", "w", encoding="utf-8").write("\n".join(out))
          PY

      - name: Open or update the alert issue
        if: steps.report.outputs.has == 'yes'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Game data drifted from the current PoE2 patch"
          num=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            # Daily cadence must not mean daily emails: comment only when the
            # findings CHANGED since the last alert (issue body or newest comment).
            gh issue view "$num" --json body,comments \
              --jq '([.body] + [.comments[].body])[-1]' > last_alert.md
            if python -c "import sys;a=open('last_alert.md',encoding='utf-8').read().strip();b=open('body.md',encoding='utf-8').read().strip();sys.exit(0 if a==b else 1)"; then
              echo "issue #$num already reports these exact findings — staying quiet"
            else
              echo "findings changed — updating issue #$num"
              gh issue comment "$num" --body-file body.md
            fi
          else
            echo "opening a new issue"
            gh issue create --title "$title" --body-file body.md
          fi
