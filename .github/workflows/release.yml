name: Release

# Build the Windows EXE and publish a GitHub Release automatically whenever a
# version tag (e.g. v2.6.8) is pushed. Uses the built-in GITHUB_TOKEN — no local
# `gh auth` or stored credentials needed. The asset is named exactly
# ExileBot2PickitGenerator.exe so the in-app auto-updater's download URL
# (releases/download/<tag>/ExileBot2PickitGenerator.exe) resolves correctly.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # version.txt / GUI VERSION may lag the tag while work is unreleased on
      # main, but a RELEASE must have all three in lockstep — the auto-updater
      # and download URLs are derived from them.
      - name: Verify version.txt and GUI VERSION match the tag
        run: |
          $tag  = "${{ github.ref_name }}".TrimStart("v")
          $file = (Get-Content version.txt -Raw).Trim()
          $gui  = (Select-String -Path poe2_pickit_gui.py -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($file -ne $tag -or $gui -ne $tag) {
            throw "Version mismatch: tag=$tag version.txt=$file VERSION=$gui - bump version.txt and VERSION before tagging."
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow customtkinter pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed --name ExileBot2PickitGenerator
          --icon appicon.ico --add-data "appicon.ico;."
          --collect-data certifi
          --hidden-import certifi --hidden-import charset_normalizer --hidden-import urllib3
          --hidden-import PIL --hidden-import PIL.Image --hidden-import PIL.ImageTk --hidden-import PIL.ImageDraw
          --exclude-module unittest --exclude-module pydoc --exclude-module doctest
          --exclude-module lib2to3 --exclude-module test --exclude-module tkinter.test
          --exclude-module numpy --exclude-module pandas --exclude-module matplotlib --exclude-module scipy
          --collect-all customtkinter
          --noconfirm poe2_pickit_gui.py

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/ExileBot2PickitGenerator.exe --title ${{ github.ref_name }} --generate-notes
