name: Release

# Build the Windows EXE and publish a GitHub Release automatically whenever a
# version tag (e.g. v2.6.8) is pushed. Uses the built-in GITHUB_TOKEN — no local
# `gh auth` or stored credentials needed. The asset is named exactly
# ExileBot2PickitGenerator.exe so the in-app auto-updater's download URL
# (releases/download/<tag>/ExileBot2PickitGenerator.exe) resolves correctly.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # A tag must never ship a red build: run EVERY gate ci.yml runs — not just
  # pytest. A tag push does NOT trigger ci.yml, so anything missing here is
  # simply not checked before the exe publishes; pytest-only was exactly the
  # v4.22.0 hole (a broken app.html shipped green).
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Separate steps, NOT one multi-line run: PowerShell only propagates the
      # LAST command's exit code, so a pytest failure inside a combined block
      # would be masked by a passing gate after it.
      - name: Install
        run: |
          pip install -r requirements.txt pytest "ruff==0.15.20"
          pip install -e .
      - name: Tests
        run: python -m pytest -q
      - name: Lint
        run: python -m ruff check .
      - name: UI gate (app.html)
        run: python tools/check_ui.py
      - name: UI logic tests
        run: node tests/test_ui_logic.mjs

  build-and-release:
    needs: test
    runs-on: windows-latest
    env:
      SIGN_PFX: ${{ secrets.SIGN_CERT_PFX_BASE64 }}
      SIGN_PWD: ${{ secrets.SIGN_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # version.py is the single source of truth (updater.py imports it), but a
      # RELEASE must match the tag — the auto-updater and download URLs are
      # derived from it.
      - name: Verify VERSION matches the tag
        run: |
          $tag  = "${{ github.ref_name }}".TrimStart("v")
          $pkg  = (Select-String -Path src/exilebot_pickit/version.py -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          if ($pkg -ne $tag) {
            throw "Version mismatch: tag=$tag version.py=$pkg - bump version.py before tagging."
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Install from the pinned requirements so the shipped exe's dependency
      # versions are controlled by the repo, not by PyPI on tag day.
      - name: Install dependencies
        run: |
          pip install -r requirements.txt "pyinstaller==6.21.0"
          pip install -e .

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed --name ExileBot2PickitGenerator
          --icon src/exilebot_pickit/resources/appicon.ico
          --add-data "src/exilebot_pickit/webui/app.html;."
          --add-data "src/exilebot_pickit/resources/appicon.png;."
          --collect-all webview --collect-all clr_loader --collect-all pythonnet
          --collect-data certifi
          --hidden-import certifi --hidden-import charset_normalizer --hidden-import urllib3
          --exclude-module unittest --exclude-module pydoc --exclude-module doctest
          --exclude-module lib2to3 --exclude-module test
          --exclude-module numpy --exclude-module pandas --exclude-module matplotlib --exclude-module scipy
          --collect-all exilebot_pickit
          --noconfirm src/exilebot_pickit/__main__.py

      # ── Code signing (DORMANT) ─────────────────────────────────────────────
      # Does nothing until two repository secrets exist:
      #   SIGN_CERT_PFX_BASE64  — the .pfx certificate, base64-encoded
      #                           (PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("cert.pfx")))
      #   SIGN_CERT_PASSWORD    — the certificate password
      # Add them under Settings → Secrets → Actions and every future release is
      # signed automatically — no code changes needed. Until then this step is
      # skipped and the exe ships unsigned (with the SHA-256 below as the
      # verification anchor).
      - name: Sign EXE (runs only when certificate secrets are configured)
        if: env.SIGN_PFX != ''
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:SIGN_PFX))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
          & $signtool.FullName sign /f cert.pfx /p $env:SIGN_PWD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 dist/ExileBot2PickitGenerator.exe
          Remove-Item cert.pfx
          & $signtool.FullName verify /pa dist/ExileBot2PickitGenerator.exe

      # Publish a SHA-256 alongside the exe so downloads can be verified
      # (the binary is unsigned; this is the minimum trust anchor).
      - name: Compute checksum
        run: |
          $h = (Get-FileHash dist/ExileBot2PickitGenerator.exe -Algorithm SHA256).Hash.ToLower()
          "$h  ExileBot2PickitGenerator.exe" | Out-File -Encoding ascii dist/SHA256SUMS.txt
          Get-Content dist/SHA256SUMS.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/ExileBot2PickitGenerator.exe dist/SHA256SUMS.txt --title ${{ github.ref_name }} --generate-notes
