name: Bug Report
description: Report something not working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using? Check Help → About or the .exe filename.
      placeholder: e.g. v2.6.21
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Opened the Items tab
        2. Clicked Refresh
        3. ...
  - type: textarea
    id: debug
    attributes:
      label: Debug tab output
      description: Open the Debug tab, copy the output, and paste it here.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checklist
      options:
        - label: I've checked for existing issues (open and closed)
          required: true
        - label: I'm using the latest release
          required: false
